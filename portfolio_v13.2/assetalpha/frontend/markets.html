<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скринер рынка — AssetAlpha</title>
    <script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark');})()</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/markets.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js?v=1772813106"></script>
</head>
<body>

    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Открыть меню">
        <div class="hamburger"><span></span><span></span><span></span></div>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="dashboard">

        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">AA</div>
                <span class="logo-text">AssetAlpha</span>
            </div>
            <nav class="nav-section">
                <div class="nav-label" data-i18n="nav.main">Главное</div>
                <a href="index.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" rx="1"/>
                        <rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/>
                        <rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                    <span data-i18n="nav.portfolio">Портфель</span>
                </a>
                <a href="markets.html" class="nav-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                    </svg>
                    <span data-i18n="nav.screener">Скринер рынка</span>
                </a>
            </nav>
            <nav class="nav-section">
                <div class="nav-label" data-i18n="nav.account">Аккаунт</div>
                <a href="settings.html" class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.6 9"/>
                    </svg>
                    <span data-i18n="nav.settings">Настройки</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-toggle">
                    <div class="theme-toggle-label">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                        </svg>
                        <span data-i18n="nav.theme">Тема</span>
                    </div>
                    <div class="theme-switch" id="themeSwitch"></div>
                </div>
                <button class="logout-btn" onclick="window.location.href='login.html'">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span data-i18n="nav.logout">Выход</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="header">
                <div class="header-left">
                    <h1 data-i18n="market.title">Скринер рынка</h1>
                    <p class="header-subtitle" data-i18n="market.subtitle">Актуальные котировки и данные по акциям</p>
                </div>
            </div>

            <div class="container">

                <div class="card">
                    <div class="search-filters">
                        <div class="search-wrapper">
                            <input type="text" id="marketSearch" class="search-input form-input"
                                data-i18n-placeholder="market.search"
                                placeholder="Поиск по тикеру или названию...">
                            <span class="search-icon">🔍</span>
                        </div>
                        <div class="filter-tabs">
                            <button class="filter-tab active" data-filter="all" data-i18n="market.all">Все</button>
                            <button class="filter-tab" data-filter="favorites" data-i18n="market.favorites">⭐ Избранное</button>
                        </div>
                    </div>

                    <!-- Секторные вкладки -->
                    <div class="sector-tabs-wrap" id="sectorTabs">
                        <button class="sector-tab active" data-sector="all">🌐 Все сектора</button>
                        <button class="sector-tab" data-sector="Technology">💻 Технологии</button>
                        <button class="sector-tab" data-sector="Financial Services">🏦 Финансы</button>
                        <button class="sector-tab" data-sector="Healthcare">🏥 Здравоохранение</button>
                        <button class="sector-tab" data-sector="Consumer Cyclical">🛒 Потреб. цикличные</button>
                        <button class="sector-tab" data-sector="Consumer Defensive">🛡️ Потреб. защитные</button>
                        <button class="sector-tab" data-sector="Energy">⚡ Энергетика</button>
                        <button class="sector-tab" data-sector="Industrials">🏭 Промышленность</button>
                        <button class="sector-tab" data-sector="Communication Services">📡 Коммуникации</button>
                        <button class="sector-tab" data-sector="Real Estate">🏢 Недвижимость</button>
                        <button class="sector-tab" data-sector="Utilities">💡 Коммунальные</button>
                    </div>

                    <!-- Заголовок активного сектора -->
                    <div id="sectorHeader" class="sector-header" style="display:none;">
                        <span id="sectorHeaderIcon" class="sector-header-icon"></span>
                        <span id="sectorHeaderTitle" class="sector-header-title"></span>
                        <span id="sectorHeaderCount" class="sector-header-count"></span>
                    </div>
                </div>

                <div class="markets-grid">
                    <div class="market-main-col">
                        <div class="card">
                            <table class="market-table">
                                <thead>
                                    <tr>
                                        <th data-i18n="market.rank">#</th>
                                        <th data-i18n="market.asset">Тикер</th>
                                        <th class="text-right" data-i18n="market.price">Цена</th>
                                        <th class="text-right" data-i18n="market.change">Δ/мес</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="marketTableBody">
                                    <tr>
                                        <td colspan="6" class="table-loading">
                                            <div class="spinner" style="margin:0 auto;"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="markets-sidebar">
                        <div class="card" id="trendingCard">
                            <div class="card-header">
                                <h3 class="card-title">🔥 Лидеры роста</h3>
                            </div>
                            <div class="trending-list" id="topStocksContainer"></div>
                        </div>

                        <!-- Сводка по секторам -->
                        <div class="card" id="sectorSummaryCard">
                            <div class="card-header">
                                <h3 class="card-title">📊 Секторы</h3>
                            </div>
                            <div class="sector-summary-list" id="sectorSummaryList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Asset Detail Modal -->
    <div id="assetModal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-group">
                    <div class="modal-icon" id="modalAssetIcon">?</div>
                    <h2 id="modalAssetTitle">Загрузка...</h2>
                </div>
                <button id="closeModalBtn" class="close-btn" aria-label="Закрыть">&times;</button>
            </div>
            <div class="modal-body">

                <!-- 1. График сверху -->
                <div class="chart-container" style="height: 260px; margin-bottom: 20px;">
                    <canvas id="assetDetailChart"></canvas>
                </div>

                <!-- 2. Метрики снизу в виде таблицы -->
                <table class="modal-metrics-table">
                    <tbody>
                        <tr>
                            <td class="mmt-label">Текущая цена</td>
                            <td class="mmt-value" id="modalAssetPrice">--</td>
                            <td class="mmt-label">Изменение (мес.)</td>
                            <td class="mmt-value" id="modalAssetChange">--</td>
                        </tr>
                        <tr>
                            <td class="mmt-label">Макс. цена (5 лет)</td>
                            <td class="mmt-value" id="modalMaxPrice">--</td>
                            <td class="mmt-label">Доходность/мес</td>
                            <td class="mmt-value" id="modalMeanReturn">--</td>
                        </tr>
                        <tr>
                            <td class="mmt-label">Риск (σ)</td>
                            <td class="mmt-value" id="modalRisk">--</td>
                            <td class="mmt-label">Sharpe Ratio</td>
                            <td class="mmt-value" id="modalSharpe">--</td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>
    </div>

    <script src="js/translations.js?v=1772813106"></script>
    <script src="js/appState.js?v=1772813106"></script>
    <script src="js/api.js?v=1772813106"></script>
    <script src="js/ui.js?v=1772813106"></script>
    <script src="js/market.js?v=1772813106"></script>
</body>
</html>
