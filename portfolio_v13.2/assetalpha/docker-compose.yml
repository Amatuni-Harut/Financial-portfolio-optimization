# ============================================================
# AssetAlpha v13.1 — Docker Compose
# Запуск: docker compose up -d
# ============================================================
version: "3.9"

services:

  # --- PostgreSQL -----------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-assetalpha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-assetalpha}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assetalpha}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Database migrations (Alembic) ----------------------------------------
  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-assetalpha}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-assetalpha}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # --- AssetAlpha API -------------------------------------------------------
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_URL:                     postgresql+asyncpg://${POSTGRES_USER:-assetalpha}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-assetalpha}
      SECRET_KEY:                 ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS:               ${CORS_ORIGINS:-http://localhost:8000}
      CACHE_TTL_HOURS:            ${CACHE_TTL_HOURS:-4}
      LOG_LEVEL:                  ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
